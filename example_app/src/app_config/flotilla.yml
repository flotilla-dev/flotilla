flotilla:
  agent_selector:
    builder: agent_selector.keyword
    min_confidence: 0.2
  checkpointer:
    builder: checkpointer.memory

llm:
  openai:
    builder: llm.openai
    model: gpt-4o-mini
    api_key: ${OPENAI_API_KEY}
    temperature: 1.5
    max_tokens: 2048
    timeout: 30


agents:
  weather_agent:
    builder: agents.weather_agent
    llm:
      provider: openai
    
tools:
  weather_tools:
    builder: tools.weather_tools
    api_key: ${WEATHER_API_KEY}
    base_url: https://api.weatherapi.com
    use_api: true