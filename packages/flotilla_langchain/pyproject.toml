[tool.poetry]
name = "flotilla-langchain"
version = "0.1.0"
description = "LangChain adapter for Flotilla"
authors = ["geoff <geoffschneider@gmail.com>"]
license = "Apache-2.0"
readme = "README.md"
homepage = "https://github.com/flotilla-dev/flotilla"
repository = "https://github.com/flotilla-dev/flotilla"
documentation = "https://github.com/flotilla-dev/flotilla/tree/main/packages/flotilla_langchain"
keywords = ["ai", "agents", "langchain", "langgraph", "workflow"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
packages = [
    { include = "flotilla_langchain", from = "src" }
]

[tool.poetry.dependencies]
python = ">=3.11,<4.0"

# Depend on core
flotilla-core = "^0.1.0"

# LangChain ecosystem
langchain = "1.0.1"
langchain-openai = "1.0.1"
langchain-community = "0.4.0"

# If you are using LangGraph explicitly:
# langgraph = "x.y.z"

[tool.poetry.group.dev.dependencies]
pytest = "8.3.4"
pytest-asyncio = "0.24.0"
pytest-cov = "6.0.0"
pytest-mock = "3.14.0"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
