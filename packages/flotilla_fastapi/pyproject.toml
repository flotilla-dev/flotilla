[tool.poetry]
name = "flotilla-fastapi"
version = "0.1.0"
description = "FastAPI integration for Flotilla"
authors = ["Geoff Schneider <geoffschneider@gmail.com>"]
license = "Apache-2.0"
readme = "README.md"
homepage = "https://github.com/flotilla-dev/flotilla"
repository = "https://github.com/flotilla-dev/flotilla"
documentation = "https://github.com/flotilla-dev/flotilla/tree/main/packages/flotilla_fastapi"
keywords = ["ai", "agents", "fastapi", "workflow", "runtime"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: FastAPI",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Internet :: WWW/HTTP :: HTTP Servers",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
packages = [
    { include = "flotilla_fastapi", from = "src" }
]

[tool.poetry.dependencies]
python = ">=3.11,<4.0"

# Core dependency
flotilla-core = "^0.1.0"

# Modern FastAPI stack (aligned versions)
fastapi = "0.135.0"
starlette = ">=0.49.1,<0.50.0"
uvicorn = "0.32.1"

# Keep consistent with your existing environment unless you upgrade globally
pydantic = "2.12.2"

[tool.poetry.group.dev.dependencies]
pytest = "8.4.2"
pytest-asyncio = "0.25.3"
httpx = "0.28.1"

[build-system]
requires = ["poetry-core==1.9.0"]
build-backend = "poetry.core.masonry.api"
