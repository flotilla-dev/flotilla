[tool.poetry]
name = "flotilla-sql"
version = "0.1.0"
description = "SQL-backed durable storage implementations for Flotilla"
authors = ["geoff <geoffschneider@gmail.com>"]
license = "Apache-2.0"
readme = "README.md"
homepage = "https://github.com/flotilla-dev/flotilla"
repository = "https://github.com/flotilla-dev/flotilla"
documentation = "https://github.com/flotilla-dev/flotilla/tree/main/packages/flotilla_sql"
keywords = ["ai", "agents", "sql", "postgresql", "durable-execution"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Database",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
packages = [
    { include = "flotilla_sql", from = "src" }
]

[tool.poetry.dependencies]
python = ">=3.11,<4.0"

# Production dependency
flotilla-core = "^0.1.0"

SQLAlchemy = "2.0.48"
asyncpg = "0.31.0"


[tool.poetry.group.dev.dependencies]
pytest = "8.3.4"
pytest-asyncio = "0.24.0"
pytest-cov = "6.0.0"
pytest-mock = "3.14.0"

# Test-only dependency
flotilla-testing = { path = "../flotilla_testing", develop = true }

testcontainers = { extras = ["postgres"], version = "^4.0.0" }
psycopg2-binary = "^2.9"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
