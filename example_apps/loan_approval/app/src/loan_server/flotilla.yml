flotilla:
  runtime:
    # reflection provider
    $class: flotilla.runtime.flotilla_runtime.FlotillaRuntime
    $name: runtime
    orchestration:
      # reference to $name value
      $ref: orchestration_strategy
    store:
      $ref: thread_store
  orchestration_strategy:
    $class: flotilla.runtime.support.single_agent_orchestration.SingleAgentOrchestration
    $name: orchestration_strategy
    agent: 
      $ref: flotilla.agents.approval_agent
    telemetry: 
      $ref: telemetry_policy
  thread_entry_store:
    $class: flotilla_sql.thread.sql_thread_entry_storey.SqlThreadEntryStore
    $name: thread_store
    engine:
      $ref: database_engine
  telemetry:
    $class: flotilla.telemetry.logger_telemetry.LoggerTelemetry
    $name: telemetry_policy
  thread_service:
    $class: flotilla.thread.thread_service.ThreadService
    $name: thread_service
    store:
      $ref: thread_store
  thread_handler:
    $class: loan_server.thread_handler.ThreadHandler
    $name: thread_handler
    thread_service:
      $ref: thread_service
  loan_handler:
    $class: loan_server.loan_handler.LoanHandler
    $name: loan_handler
    runtime:
      $ref: runtime
  llm:
    openai:
      $provider: llm.openai
      model: gpt-4o-mini
      api_key: 
        $secret: OPENAI_API_KEY
      temperature: 0.2
      max_tokens: 2048
      timeout: 30
  checkpointer:
    $provider: postgres_saver_provider
    $name: checkpointer
    dsn:
      $secret: SQL_PSYCOPG_CONNECTION
    schema: flotilla
  database:
    engine:
      $provider: async_engine_provider
      $name: database_engine
      dsn:
        $secret: SQL_ASYNC_CONNECTION

  agents:
    approval_agent:
      $class: loan_server.approval_agent.ApprovalAgent
      llm: 
        $ref: flotilla.llm.openai
      checkpointer:
        $ref: checkpointer
      tools:
        $list:
          - $class: loan_server.risk_assessment_tool.RiskAssessmentTool
          - $class: loan_server.loan_tool.LoanProcessingTool

    
