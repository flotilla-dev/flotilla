[pytest]
# Test discovery
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Only run integration tests from root
testpaths =
    src/flotilla_core/tests
    src/flotilla_langchain/tests
    tests/integration

# Output options
addopts =
    -v
    --strict-markers
    --tb=short

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    example: Example app tests

# Async support
asyncio_mode = auto
