[pytest]
# Pytest configuration file
pythonpath = 
    src
    example_app/src

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Default test paths (core framework)
testpaths = 
    tests
    example_app/tests


# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    example: Example app tests

# Async support
asyncio_mode = auto

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage options
[coverage:run]
source = 
    src
    example_app/src

omit = 
    */tests/*
    */venv/*
    */env/*
    */__pycache__/*
    */site-packages/*
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
