flotilla:
  database:
    type: postgres
    host: localhost
    port: 5432
    connection_pool_size: 10

llm:
  openai:
    builder: "openai-builder"
    model: gpt-4
    api_key: sk-proj-xxxxxxxxxxxxxxxxxxxxx
    base_url: https://api.openai.com/v1
    version: v1
    temperature: 0.7
    max_tokens: 2048
    timeout_seconds: 30
  
  anthropic:
    builder: "anthropic-builder"
    model: claude-sonnet-4-20250514
    api_key: sk-ant-xxxxxxxxxxxxxxxxxxxxx
    base_url: https://api.anthropic.com
    endpoint: https://api.anthropic.com/v1/messages
    version: 2023-06-01
    temperature: 0.8
    max_tokens: 4096
    timeout_seconds: 60

agents:
  customer_support:
    builder: CustomerSupportAgent
    llm:
      provider: openai
      model: gpt-4-turbo
      temperature: 0.5
    tools:
      - search_knowledge_base
      - create_ticket
      - send_email
  
  data_analyst:
    builder: DataAnalystAgent
    llm:
      provider: anthropic
      temperature: 0.3
      max_tokens: 8192
    tools:
      - query_database
      - generate_chart
  
  general_assistant:
    builder: GeneralAssistant
    llm:
      provider: openai
    tools:
      - search_knowledge_base

tools:
  search_knowledge_base:
    builder: KnowledgeBaseSearch
    index_name: kb_main
    max_results: 10
  
  create_ticket:
    builder: TicketCreator
    system: jira
    default_priority: medium
  
  send_email:
    builder: EmailSender
    smtp_host: smtp.company.com
    from_address: support@company.com
  
  query_database:
    builder: DatabaseQuery
    connection_string: postgresql://user:pass@localhost/analytics
    read_only: true
  
  generate_chart:
    builder: ChartGenerator
    output_format: png
    default_width: 800
    default_height: 600